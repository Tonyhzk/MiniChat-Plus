<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Chat bubble icon -->
  <g transform="translate(80, 55)">
    <rect x="0" y="0" width="70" height="50" rx="10" fill="rgba(255,255,255,0.2)"/>
    <polygon points="15,50 25,65 35,50" fill="rgba(255,255,255,0.2)"/>
    <circle cx="20" cy="25" r="4" fill="rgba(255,255,255,0.6)"/>
    <circle cx="35" cy="25" r="4" fill="rgba(255,255,255,0.6)"/>
    <circle cx="50" cy="25" r="4" fill="rgba(255,255,255,0.6)"/>
  </g>
  <!-- Title -->
  <text x="180" y="95" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="white">MiniChat-Plus</text>
  <!-- Subtitle EN -->
  <text x="180" y="130" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)">Lightweight, Anonymous, Ephemeral Chat Tool</text>
  <!-- Subtitle CN -->
  <text x="180" y="155" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">轻量级 · 匿名 · 无痕 · 即用即销的聊天工具</text>
</svg>
