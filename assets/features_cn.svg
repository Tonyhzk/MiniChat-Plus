<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Card 1 -->
  <rect x="20" y="20" width="175" height="240" rx="12" fill="url(#card1)"/>
  <text x="107" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">🪶</text>
  <text x="107" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">极致轻量</text>
  <text x="107" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">无需数据库</text>
  <text x="107" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">镜像仅 16MB</text>
  <!-- Card 2 -->
  <rect x="215" y="20" width="175" height="240" rx="12" fill="url(#card2)"/>
  <text x="302" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">🔒</text>
  <text x="302" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">隐私至上</text>
  <text x="302" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">匿名昵称随意填写</text>
  <text x="302" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">数据不落盘不留痕</text>
  <!-- Card 3 -->
  <rect x="410" y="20" width="175" height="240" rx="12" fill="url(#card3)"/>
  <text x="497" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">💨</text>
  <text x="497" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">阅后即焚</text>
  <text x="497" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">所有人离开后</text>
  <text x="497" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">房间自动销毁</text>
  <!-- Card 4 -->
  <rect x="605" y="20" width="175" height="240" rx="12" fill="url(#card4)"/>
  <text x="692" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">📱</text>
  <text x="692" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">响应式适配</text>
  <text x="692" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">手机端 Web端</text>
  <text x="692" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">完美自适应</text>
</svg>
