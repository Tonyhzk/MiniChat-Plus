<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Card 1 -->
  <rect x="20" y="20" width="175" height="240" rx="12" fill="url(#card1)"/>
  <text x="107" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">🪶</text>
  <text x="107" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Ultra Lightweight</text>
  <text x="107" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">No database required</text>
  <text x="107" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Docker image only 16MB</text>
  <!-- Card 2 -->
  <rect x="215" y="20" width="175" height="240" rx="12" fill="url(#card2)"/>
  <text x="302" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">🔒</text>
  <text x="302" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Privacy First</text>
  <text x="302" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Anonymous nicknames</text>
  <text x="302" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">No data persistence</text>
  <!-- Card 3 -->
  <rect x="410" y="20" width="175" height="240" rx="12" fill="url(#card3)"/>
  <text x="497" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">💨</text>
  <text x="497" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Ephemeral</text>
  <text x="497" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Room auto-destroys</text>
  <text x="497" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">when everyone leaves</text>
  <!-- Card 4 -->
  <rect x="605" y="20" width="175" height="240" rx="12" fill="url(#card4)"/>
  <text x="692" y="80" font-family="Arial" font-size="36" fill="white" text-anchor="middle">📱</text>
  <text x="692" y="120" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Responsive</text>
  <text x="692" y="145" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Mobile &amp; Desktop</text>
  <text x="692" y="165" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">adaptive layout</text>
</svg>
